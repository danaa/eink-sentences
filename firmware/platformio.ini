[env:xiao]
platform = espressif32
board = seeed_xiao_esp32c3
framework = arduino
monitor_speed = 115200
upload_speed = 921600

build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

lib_deps =
    zinggjm/GxEPD2@^1.5.8
    bitbank2/PNGdec@^1.0.3

; Debug env for a bare XIAO ESP32-S3 (no display attached). Compiles
; a network-only diagnostic that verifies Wi-Fi + HTTP fetch work.
[env:s3-debug]
platform = espressif32
board = seeed_xiao_esp32s3
framework = arduino
monitor_speed = 115200
upload_speed = 921600

build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DNO_DISPLAY

lib_deps =
