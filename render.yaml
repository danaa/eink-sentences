services:
  - type: web
    name: eink-sentences
    runtime: python
    plan: free
    region: frankfurt
    buildCommand: pip install -r server/requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT --workers 1 --threads 2 server.app:app
    envVars:
      - key: SENTENCES_URL
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.9
